name: 'y321: 🌿🥗 食事記録（自由記述）'

on:
  workflow_dispatch:
    inputs:
      food:
        required: true
        description: '食べたもの'
        type: string
      category:
        required: true
        description: '分類'
        type: string
      quantity:
        required: true
        description: '分量'
        type: number
      unit:
        required: true
        description: '単位'
        type: choice
        options:
          - ''
          - '人前'
          - '個'
          - '本'
          - '杯'
          - '袋'
          - '箱'
          - 'パック'
          - 'g'
          - 'ml'
      score:
        required: true
        description: 'MIND スコア'
        type: choice
        options:
          - ''
          - '0'
          - '+1'
          - '+2'
          - '+3'
          - '+4'
          - '+5'
          - ''
          - '-1'
          - '-3'
          - '-5'
      seasoning:
        required: false
        description: '調味料'
        type: choice
        options:
          - ''
          - 'エクストラヴァージンオリーブオイル'
          - 'ドレッシング'
          - '塩'
          - '醤油'
          - 'はちみつ'
          - '納豆のタレ'
          - 'カラシ'
      impression:
        required: false
        description: '感想'
        type: string

jobs:
  food:
    uses: noraworld/diary-templates-assistant/.github/workflows/base.yml@main
    with:
      search_query: "food 食事記録"
      template_name: "food-eaten"
      template_repo: "noraworld/diary-templates"
      version: "0.2.5"
    secrets:
      token: ${{ secrets.GH_TOKEN }}
