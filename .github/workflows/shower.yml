name: '651: 🧹🛁 入浴記録'

on:
  workflow_dispatch:
    inputs:
      impression:
        required: false
        description: '所感'
        type: string
      timer:
        required: false
        description: 'タイマー（分）'
        type: choice
        options:
          - ''
          - '5'
          - '10'
          - '15'
          - '20'
          - '25'
          - '30'
          - '35'
          - '40'
          - '45'
          - '50'
          - '55'
          - '60'
      minutes:
        required: false
        description: '分'
        type: number
      seconds:
        required: false
        description: '秒'
        type: number
      bath:
        required: true
        description: '入浴'
        type: boolean

jobs:
  shower:
    uses: noraworld/diary-templates-assistant/.github/workflows/base.yml@main
    with:
      search_query: "shower 入浴記録"
      template_name: "shower"
      template_repo: "noraworld/diary-templates"
      version: "0.2.0"
    secrets:
      token: ${{ secrets.GH_TOKEN }}
