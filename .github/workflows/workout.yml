name: '121: 🚀💪 ワークアウト'

on:
  workflow_dispatch:
    inputs:
      minutes:
        required: true
        description: '分'
        type: number
      seconds:
        required: true
        description: '秒'
        type: number
      burned:
        required: true
        description: '消費カロリー'
        type: number
      streaks:
        required: true
        description: '連続日数'
        type: number
      strength:
        required: true
        description: '所感強度'
        type: choice
        options:
          - ''
          - '☆☆☆☆☆☆☆☆☆☆'
          - '★☆☆☆☆☆☆☆☆☆'
          - '★★☆☆☆☆☆☆☆☆'
          - '★★★☆☆☆☆☆☆☆'
          - '★★★★☆☆☆☆☆☆'
          - '★★★★★☆☆☆☆☆'
          - '★★★★★★☆☆☆☆'
          - '★★★★★★★☆☆☆'
          - '★★★★★★★★☆☆'
          - '★★★★★★★★★☆'
          - '★★★★★★★★★★'
      comfortable:
        required: true
        description: '動き易さ'
        type: choice
        options:
          - ''
          - '☆☆☆☆☆☆☆☆☆☆'
          - '★☆☆☆☆☆☆☆☆☆'
          - '★★☆☆☆☆☆☆☆☆'
          - '★★★☆☆☆☆☆☆☆'
          - '★★★★☆☆☆☆☆☆'
          - '★★★★★☆☆☆☆☆'
          - '★★★★★★☆☆☆☆'
          - '★★★★★★★☆☆☆'
          - '★★★★★★★★☆☆'
          - '★★★★★★★★★☆'
          - '★★★★★★★★★★'
      impression:
        required: false
        description: '所感・その他'
        type: string
      plan:
        required: true
        description: 'メニュー'
        type: choice
        options:
          - ''
          - 'Daily'
          - 'Chest - Beginner'
          - 'Chest - Intermediate'
          - 'Chest - Advanced'
          - 'Full Body - Beginner'
          - 'Full Body - Intermediate'
          - 'Full Body - Advanced'
          - 'Abs - Beginner'
          - 'Abs - Intermediate'
          - 'Abs - Advanced'
          - 'Arm - Beginner'
          - 'Arm - Intermediate'
          - 'Arm - Advanced'
          - 'Shoulder & Back - Beginner'
          - 'Shoulder & Back - Intermediate'
          - 'Shoulder & Back - Advanced'
          - 'Leg - Beginner'
          - 'Leg - Intermediate'
          - 'Leg - Advanced'
        default: ''
      trainer:
        required: true
        description: 'トレーナー'
        type: choice
        options:
          - 'Streaks Workout'
          - 'Home Workout'
        default: 'Home Workout'

jobs:
  workout:
    uses: noraworld/diary-templates-assistant/.github/workflows/base.yml@main
    with:
      search_query: "workout ワークアウト"
      template_name: "workout"
      template_repo: "noraworld/diary-templates"
      version: "0.2.0"
    secrets:
      token: ${{ secrets.GH_TOKEN }}
