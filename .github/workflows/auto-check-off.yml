name: Auto Check-off

on:
  workflow_call:
    inputs:
      main_repo:
        required: true
        type: string
    secrets:
      token:
        required: true

jobs:
  check:
    # https://stackoverflow.com/questions/59588605/how-to-check-for-a-label-in-a-github-action-condition#answer-59588725
    # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/evaluate-expressions-in-workflows-and-actions#example-using-an-object-filter
    if: >
      github.event.issue.state == 'open'                       &&
      !contains(github.event.issue.labels.*.name, 'abandoned') &&
      !contains(github.event.issue.labels.*.name, 'achieved')  &&
      !contains(github.event.issue.labels.*.name, 'done')      &&
      !contains(github.event.issue.labels.*.name, 'yet')
    runs-on: ubuntu-latest
    steps:
      # "💤_2025-05-10_sleep_睡眠記録" => "睡眠記録"
      - name: Get a title
        run: echo "TITLE=$(cut -d '_' -f4 <<< "${{ github.event.issue.title }}")" >> $GITHUB_ENV

      # to avoid situations where the checklist is not reflected because of a simultaneous update
      - name: Sleep
        if: env.TITLE == 'データベース'
        run: sleep 30
        shell: sh

      - name: Check it off
        run: |
          NUMBER=$(
            gh issue list         \
              --repo "$MAIN_REPO" \
              --limit 1           |
              awk '{ print $1 }'
          )
          BODY=$(
            gh issue view         \
              --repo "$MAIN_REPO" \
              --json body         \
              --jq .body          \
              "$NUMBER"
          )
          ESCAPED_TITLE=$(printf '%s\n' "$TITLE" | sed 's/[][(){}.^$*+?|\\/]/\\&/g')
          CHECKED_PATTERN="^\\* *\\[x\\].*\\[$ESCAPED_TITLE\\]"

          if printf '%s\n' "$BODY" | grep -qE "$CHECKED_PATTERN"; then
            echo "The task is already checked off."
            exit 0
          fi

          BODY_WITH_CHECKED_MANDATORY_TASK=$(
            printf '%s\n' "$BODY" |
            sed -E "s/^\\* *\\[ \\](.*)\\[$ESCAPED_TITLE\\]/\\* [x]\\1[$TITLE]/g"
          )

          if [ "$BODY" != "$BODY_WITH_CHECKED_MANDATORY_TASK" ]; then
            gh issue edit --repo "$MAIN_REPO" --body "$BODY_WITH_CHECKED_MANDATORY_TASK" "$NUMBER"
          else
            BODY_WITH_CHECKED_OPTIONAL_TASK=$(
              printf '%s\n' "$BODY" |
              sed -E "s/^\\*(.*)\\[$ESCAPED_TITLE\\]/\\* [x]\\1[$TITLE]/g"
            )

            if [ "$BODY" = "$BODY_WITH_CHECKED_OPTIONAL_TASK" ]; then
              echo "ERROR: no unchecked task matched [$TITLE] in issue #$NUMBER" >&2
              exit 1
            fi

            gh issue edit --repo "$MAIN_REPO" --body "$BODY_WITH_CHECKED_OPTIONAL_TASK" "$NUMBER"
          fi

          EDITED_BODY=$(
            gh issue view         \
              --repo "$MAIN_REPO" \
              --json body         \
              --jq .body          \
              "$NUMBER"
          )

          if ! printf '%s\n' "$EDITED_BODY" | grep -qE "$CHECKED_PATTERN"; then
            echo "ERROR: [$TITLE] doesn't seem to be checked off in issue #$NUMBER" >&2
            exit 1
          fi

          if [ "$(printf '%s\n' "$EDITED_BODY" | grep -cE "^\* *\[x\] *\[x\]")" -ne 0 ]; then
            BODY_WITH_DUPLICATED_CHECKMARK_FIXED=$(
              printf '%s\n' "$EDITED_BODY" |
              sed -E "s/^\* *\[x\] *\[x\]/\* \[x\]/g"
            )

            gh issue edit --repo "$MAIN_REPO" --body "$BODY_WITH_DUPLICATED_CHECKMARK_FIXED" "$NUMBER"
          fi
        shell: sh
        env:
          MAIN_REPO: ${{ inputs.main_repo }}
          GH_TOKEN: ${{ secrets.token }}

  label:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add the label
        run: |
          gh issue edit ${{ github.event.issue.number }} --add-label 'achieved'
        shell: sh
        env:
          GH_TOKEN: ${{ secrets.token }}

  yet:
    if: >
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'yet')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Remove the label
        run: |
          gh issue edit ${{ github.event.issue.number }} --remove-label 'yet'
        shell: sh
        env:
          GH_TOKEN: ${{ secrets.token }}
